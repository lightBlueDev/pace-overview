  <text x="92" y="126" fill="#2B2218" font-family="Georgia, 'Times New Roman', serif" font-size="66" font-weight="700">PACE</text>
  <text x="92" y="170" fill="#6A6055" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28">Structured operating model for AI-assisted implementation</text>

  <text x="92" y="252" fill="#32281C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700">Clarify before coding.</text>
  <text x="92" y="296" fill="#32281C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700">Audit before drift.</text>
  <text x="92" y="340" fill="#32281C" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700">Close beyond “tests passed.”</text>

  <text x="92" y="408" fill="#6F6559" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22">A disciplined workflow for planning, task slicing,</text>
  <text x="92" y="438" fill="#6F6559" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22">handoff quality, and implementation closure.</text>

